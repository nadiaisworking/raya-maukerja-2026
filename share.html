<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Result - Maukerja</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .share-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .share-header {
            margin-bottom: 40px;
        }

        .share-header h1 {
            font-size: 1.2rem;
            font-weight: 400;
            color: #ddd;
        }

        .share-header span {
            font-weight: 700;
            color: #fff;
        }

        .previews-scroll {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 20px 0 40px;
            width: 100vw;
            padding-left: calc(50vw - 110px);
            padding-right: 20px;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
        }

        .previews-scroll::-webkit-scrollbar {
            display: none;
        }

        .preview-item {
            flex: 0 0 220px;
            scroll-snap-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .preview-card {
            width: 100%;
            aspect-ratio: 9/16;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
            margin-bottom: 20px;
        }

        .preview-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
        }

        /* Mock UI Overlays */
        .mock-ui {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        /* Reel Mock */
        .reel-mock .mock-icon {
            position: absolute;
            right: 15px;
            bottom: 80px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .reel-mock .mock-btn {
            width: 24px;
            height: 24px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
        }

        /* Post Mock */
        .post-mock .mock-header {
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
        }
        .post-mock .avatar {
            width: 24px;
            height: 24px;
            background: #444;
            border-radius: 50%;
        }

        /* Story Mock */
        .story-mock .progress-bar {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            height: 2px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
        }

        /* Message Mock */
        .message-mock {
            background: #111;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
        }
        .message-bubble {
            background: #3797f0;
            border-radius: 18px;
            padding: 8px;
            max-width: 80%;
            align-self: flex-end;
        }
        .message-bubble img {
            width: 100%;
            border-radius: 12px;
        }

        .btn-post {
            background-color: #0095f6;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            max-width: 140px;
            transition: transform 0.2s;
        }

        .btn-post:active {
            transform: scale(0.95);
        }

        .back-link {
            margin-top: auto;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="share-container">
        <div class="share-header">
            <h1 id="sharing-as">Sharing as <span>anda</span></h1>
        </div>

        <div class="previews-scroll">
            <!-- Reel -->
            <div class="preview-item">
                <div class="preview-card reel-mock">
                    <img src="" alt="Preview" class="preview-image shared-image">
                    <div class="mock-ui">
                        <div class="mock-icon">
                            <div class="mock-btn"></div>
                            <div class="mock-btn"></div>
                            <div class="mock-btn"></div>
                        </div>
                    </div>
                </div>
                <button class="btn-post" onclick="shareTo('reel')">Reel</button>
            </div>

            <!-- Post -->
            <div class="preview-item">
                <div class="preview-card post-mock">
                    <div class="mock-header">
                        <div class="avatar"></div>
                        <span>anda</span>
                    </div>
                    <img src="" alt="Preview" class="preview-image shared-image">
                </div>
                <button class="btn-post" onclick="shareTo('post')">Post</button>
            </div>

            <!-- Story -->
            <div class="preview-item">
                <div class="preview-card story-mock">
                    <div class="progress-bar"></div>
                    <img src="" alt="Preview" class="preview-image shared-image">
                </div>
                <button class="btn-post" onclick="shareTo('story')">Story</button>
            </div>

            <!-- Message -->
            <div class="preview-item">
                <div class="preview-card message-mock">
                    <div class="message-bubble">
                        <img src="" alt="Preview" class="shared-image">
                    </div>
                </div>
                <button class="btn-post" onclick="shareTo('message')">Message</button>
            </div>
        </div>

        <a href="results.html" class="back-link">← Kembali ke keputusan</a>
    </div>

    <script src="share.js"></script>
</body>
</html>
